<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GoTrippy provides family cab booking for temple trips, airport pickup and drop, local rides, picnics, and outstation trips in India."
    />
    <title>GoTrippy | Family Cab Booking</title>
    <script>
      (function () {
        var locationRef = window.location;
        if (locationRef.search[1] === "/") {
          var decoded = locationRef.search
            .slice(1)
            .split("&")
            .map(function (part) {
              return part.replace(/~and~/g, "&");
            })
            .join("?");

          window.history.replaceState(null, null, locationRef.pathname.slice(0, -1) + decoded + locationRef.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
